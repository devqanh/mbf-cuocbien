              <span className="tnum" style={{ color: "var(--ink-3)", fontSize: 12.5 }}>{(st.from || st.to) ? `${fmtDate(st.from) || "…"} – ${fmtDate(st.to) || "…"}` : "—"}</span>
              <span className="tnum" style={{ textAlign: "right", fontWeight: 600 }}>{fmtVND(st.tongThu)}</span>
              {(() => { const daTT = (st.payments || []).reduce((a, p) => a + (parseInt((p.amount || "0").toString().replace(/[^\d]/g, ""), 10) || 0), 0); const con = st.tongThu - daTT; return (
                <span className="tnum" style={{ textAlign: "right", fontWeight: 600, color: con > 0 ? "var(--warn)" : "var(--good)" }}>{fmtVND(Math.max(0, con))}</span>
              ); })()}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const load = (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; }
  };
  // migrate old HPH cost shape -> unified items[]
  const migrateShip = (s) => {
    if (!s || !s.cost) return s;
    let out = s;
    if (!s.cost.items) {
      const c = s.cost, g = (x) => x || "";
      const items = [];
      let n = 1;
      if (g(c.cuocXeNgoai)) items.push({ id: n++, item: "Cước xe ngoài", amount: c.cuocXeNgoai, payer: "", billable: false });
      (c.choHo || []).forEach((e) => items.push({ id: n++, item: e.item, amount: e.amount, payer: e.payer || "", billable: true }));
      if (g(c.hqToKhai)) items.push({ id: n++, item: "Hải quan — tờ khai khoán", amount: c.hqToKhai, payer: c.hqPayer || "", billable: false });
      if (g(c.hqKhac)) items.push({ id: n++, item: "Hải quan — khác", amount: c.hqKhac, payer: "", billable: false });
      if (c.chonVo && g(c.chonVo.amt)) items.push({ id: n++, item: "Chọn vỏ", amount: c.chonVo.amt, payer: c.chonVo.payer || "", billable: false });
      if (g(c.mbfVk)) items.push({ id: n++, item: "Chi phí MBF / VK", amount: c.mbfVk, payer: "", billable: false });
      out = { ...out, cost: { items } };
    }
    // migrate veh fixed fields -> items[]
    if (s.veh && !s.veh.items) {
      const vv = s.veh, g = (x) => x || "";
      const vitems = [];
      let m = 1;
      [["Vé trạm", vv.veTram], ["Tiền đường", vv.tienDuong], ["Vé VETC", vv.veVetc], ["Trợ cấp", vv.troCap], ["Lương", vv.luong], ["Chi phí khác", vv.chiPhiKhac], ["Phụ cấp tiền đường", vv.phuCapTienDuong]].forEach(([nm, amt]) => { if (g(amt)) vitems.push({ id: m++, item: nm, amount: amt }); });
      const nveh = { ...vv, items: vitems };
      delete nveh.veTram; delete nveh.tienDuong; delete nveh.veVetc; delete nveh.troCap; delete nveh.luong; delete nveh.chiPhiKhac; delete nveh.phuCapTienDuong;
      out = { ...out, veh: nveh };
    }
    return out;
  };
  // migrate ICD veh-based cost -> unified cost.items[]
  const migrateICD = (s) => {
    if (!s || (s.cost && s.cost.items)) return s;
    const vv = s.veh || {}, g = (x) => x || "";
    const items = [];
    let n = 1;
    [["Phụ cấp tiền đường", vv.phuCapTienDuong], ["Trợ cấp", vv.troCap], ["Lương", vv.luong], ["Chi phí khác", vv.chiPhiKhac]].forEach(([nm, amt]) => { if (g(amt)) items.push({ id: n++, item: nm, amount: amt, payer: "", billable: false }); });
    const fuel = (parseInt(g(vv.lit).toString().replace(/[^\d]/g, ""), 10) || 0) * (parseInt(g(vv.donGia).toString().replace(/[^\d]/g, ""), 10) || 0);
    if (fuel > 0) items.push({ id: n++, item: "Tiền dầu", amount: String(fuel), payer: "", billable: false });
    return { ...s, cost: { items } };
  };
  const [sheet, setSheet] = useState("icd");
  const [hph, setHph] = useState(() => load("trk_hph", SEED).map(migrateShip));
  const [icd, setIcd] = useState(() => load("trk_icd", SEED_ICD).map(migrateICD));
  const [cfg, setCfgState] = useState(() => {
    const stored = load("trk_cfg", {});
    const merged = { ...SEED_CFG, ...stored };
    // union costItems catalog so common cost lines always available
    merged.costItems = [...new Set([...(SEED_CFG.costItems || []), ...(stored.costItems || [])])];
    return merged;
  });
  const [showCfg, setShowCfg] = useState(false);
  const [showKe, setShowKe] = useState(false);
  const [view, setView] = useState("ships");
  const [ke, setKe] = useState(() => load("trk_ke", []));
  const [viewKe, setViewKe] = useState(null);
  useEffect(() => { try { localStorage.setItem("trk_ke", JSON.stringify(ke)); } catch (e) {} }, [ke]);
  const [modal, setModal] = useState(null); // {id, type}
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState("all"); // all | no | paid | overdue
  const [sort, setSort] = useState({ key: "default", dir: 1 });
  const isHph = sheet === "hph";
  const ships = isHph ? hph : icd;
  const setShips = isHph ? setHph : setIcd;
  const setCfgKey = (key, val) => setCfgState((c) => ({ ...c, [key]: val }));
  const addCfg = (key, v) => setCfgState((c) => (c[key] || []).includes(v) ? c : { ...c, [key]: [...(c[key] || []), v] });

  useEffect(() => { try { localStorage.setItem("trk_hph", JSON.stringify(hph)); } catch (e) {} }, [hph]);
  useEffect(() => { try { localStorage.setItem("trk_icd", JSON.stringify(icd)); } catch (e) {} }, [icd]);
  useEffect(() => { try { localStorage.setItem("trk_cfg", JSON.stringify(cfg)); } catch (e) {} }, [cfg]);

  const patch = (id, np) => setShips((s) => s.map((sh) => (sh.id === id ? { ...sh, ...np } : sh)));
  const active = modal ? ships.find((s) => s.id === modal.id) : null;

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const metrics = (s) => {
    const cost = calcCost(s.cost).tongChiPhi;
    const r = isHph ? calcRev(s.rev) : calcRevICD(s.rev);
    const profit = (r.phaiThu - r.vat) - cost;
    const overdue = r.conNo > 0 && s.rev?.hanTT && new Date(s.rev.hanTT) < today;
    return { cost, r, profit, overdue };
  };

  const rows = useMemo(() => {
    const t = q.trim().toLowerCase();
    let list = ships.filter((s) => !t || [s.customer, s.booking, s.inv, s.contNo, s.kho].join(" ").toLowerCase().includes(t));
    if (filter !== "all") list = list.filter((s) => {
      const out = !!(s.bksRa && s.bksRa.trim());
      if (filter === "out") return out;
      if (filter === "notout") return !out;
      return true;
    });
    if (sort.key !== "default") {
      list = [...list].sort((a, b) => {
        const ma = metrics(a), mb = metrics(b);
        if (sort.key === "customer") return (a.customer || "").localeCompare(b.customer || "") * sort.dir;
        let va, vb;
        if (sort.key === "cost") { va = ma.cost; vb = mb.cost; }
        else if (sort.key === "thu") { va = ma.r.phaiThu; vb = mb.r.phaiThu; }
        else if (sort.key === "no") { va = ma.r.conNo; vb = mb.r.conNo; }
        else if (sort.key === "profit") { va = ma.profit; vb = mb.profit; }
        return (va - vb) * sort.dir;
      });
    }
    return list;
  }, [ships, q, filter, sort, sheet]);

  const totals = useMemo(() => ships.reduce((a, s) => {
    const m = metrics(s);
    a.cost += m.cost; a.rev += m.r.tongDT; a.thu += m.r.phaiThu; a.no += Math.max(0, m.r.conNo); a.profit += m.profit;
    a.overdue += m.overdue ? 1 : 0;
    return a;
  }, { cost: 0, rev: 0, thu: 0, no: 0, profit: 0, overdue: 0 }), [ships, sheet]);

  const addRow = () => {
    const vat = (cfg.vatDefault || {})[sheet] || (isHph ? "8" : "0");
    const base = isHph
      ? { customer: "", booking: "", io: "Xuất", qty: 1, contType: "40HC", contNo: "", from: "", to: "", sailDate: "", cutOff: "", cost: { choHo: [] }, veh: {}, rev: { vatRate: vat, doanhThu: [], choHo: [], payments: [] } }
      : { customer: "", booking: "", io: "Nhập", contNo: "", contType: "40HC", kho: "", bksVao: "", bksRa: "", from: "ICD Quế Võ", to: "", contDen: "", contRa: "", veh: {}, rev: { vatRate: vat, doanhThu: [], choHo: [], payments: [] } };
    setShips((x) => [...x, mk(base)]);
  };

  const toggleSort = (key) => setSort((s) => s.key === key ? { key, dir: -s.dir } : { key, dir: 1 });
  const minW = isHph ? 920 : 880;

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      {/* top bar */}
      <header style={{ background: "#fff", borderBottom: "1px solid var(--line)", padding: "0 22px", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, height: 58 }}>
          <div style={{ width: 32, height: 32, borderRadius: 9, background: "var(--accent)", color: "#fff", display: "grid", placeItems: "center" }}><I.truck /></div>
          <div style={{ fontSize: 15.5, fontWeight: 700, letterSpacing: "-0.01em" }}>Trucking</div>
          <nav style={{ display: "flex", gap: 2, marginLeft: 14, background: "#f1f2f4", padding: 3, borderRadius: 9 }}>
            {[["ships", "Lô hàng"], ["price", "Bảng giá"], ["ke", "Bảng kê"]].map(([id, label]) => (
              <button key={id} type="button" onClick={() => { setView(id); setModal(null); }}
                style={{ border: "none", cursor: "pointer", padding: "6px 15px", borderRadius: 7, fontSize: 13.5, fontWeight: 600, whiteSpace: "nowrap",
                  background: view === id ? "#fff" : "transparent", color: view === id ? "var(--accent)" : "var(--ink-3)", boxShadow: view === id ? "0 1px 2px rgba(16,19,23,.12)" : "none", transition: "all .12s" }}>
                {label}
              </button>
            ))}
          </nav>
          <div style={{ flex: 1 }} />
          {view === "ships" && (
            <div style={{ position: "relative" }}>
              <span style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: "var(--ink-4)" }}><I.search /></span>
              <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Tìm khách, booking, container…"
                style={{ width: 260, padding: "9px 12px 9px 34px", fontSize: 13.5, border: "1px solid var(--line)", borderRadius: 10, outline: "none", background: "#fafbfc" }}
                onFocus={(e) => { e.target.style.borderColor = "var(--accent)"; e.target.style.background = "#fff"; }}
                onBlur={(e) => { e.target.style.borderColor = "var(--line)"; e.target.style.background = "#fafbfc"; }} />
            </div>
          )}
          <button type="button" onClick={() => setShowCfg(true)} title="Cấu hình dữ liệu danh mục"
            style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "9px 13px", fontSize: 13.5, fontWeight: 600, cursor: "pointer", color: "var(--ink-2)", background: "#fff", border: "1px solid var(--line)", borderRadius: 10 }}
            onMouseEnter={(e) => { e.currentTarget.style.background = "var(--line-2)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "#fff"; }}>
            <I.cog /> Cấu hình
          </button>
          {view === "ships" && (
            <button type="button" onClick={addRow}
              style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "9px 15px", fontSize: 13.5, fontWeight: 600, cursor: "pointer", color: "#fff", background: "var(--accent)", border: "none", borderRadius: 10, boxShadow: "0 1px 2px rgba(42,111,219,.4)" }}>
              <I.plus /> Thêm lô hàng
            </button>
          )}
        </div>
        {view === "ships" && (
          <div style={{ display: "flex", gap: 2, padding: "0 0 10px", marginTop: -2 }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 7, background: "#f1f2f4", padding: "6px 13px", borderRadius: 9, fontSize: 13, fontWeight: 600, color: "var(--ink)" }}>
              HẠ ICD <span style={{ fontWeight: 400, color: "var(--ink-4)", fontSize: 12 }}>· Quế Võ</span>
            </div>
          </div>
        )}
      </header>

      {view === "ships" ? (<>
      {/* summary strip */}
      <div style={{ display: "flex", gap: 0, background: "#fff", borderBottom: "1px solid var(--line)", padding: "0 22px", flexShrink: 0, flexWrap: "wrap" }}>
        {[["Lô hàng", ships.length, "ink"], ["Tổng chi phí", fmtVND(totals.cost), "ink"]].map(([k, v, tone], i, arr) => (
          <div key={k} style={{ padding: "13px 26px 13px 0", marginRight: 26, borderRight: i < arr.length - 1 ? "1px solid var(--line-2)" : "none" }}>
            <div style={{ fontSize: 11.5, color: "var(--ink-3)", marginBottom: 3 }}>{k}</div>
            <div className="tnum" style={{ fontSize: 16, fontWeight: 700, color: tone === "warn" ? "var(--warn)" : tone === "good" ? "var(--good)" : "var(--ink)" }}>{v}</div>
          </div>
        ))}
      </div>

      {/* filter bar */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, background: "#fff", borderBottom: "1px solid var(--line)", padding: "10px 22px", flexShrink: 0 }}>
        <span style={{ fontSize: 12.5, color: "var(--ink-3)", fontWeight: 500 }}>Lọc:</span>
        <div style={{ display: "inline-flex", background: "#f1f2f4", borderRadius: 9, padding: 3 }}>
          {[["all", "Tất cả"], ["notout", "Chưa ra"], ["out", "Đã ra"]].map(([k, label]) => {
            const on = filter === k;
            const cnt = k === "all" ? ships.length : ships.filter((s) => { const o = !!(s.bksRa && s.bksRa.trim()); return k === "out" ? o : !o; }).length;
            return (
              <button key={k} type="button" onClick={() => setFilter(k)}
                style={{ display: "inline-flex", alignItems: "center", gap: 6, border: "none", cursor: "pointer", fontSize: 12.5, fontWeight: 600, padding: "6px 13px", borderRadius: 7,
                  background: on ? "#fff" : "transparent", color: on ? (k === "notout" ? "var(--warn)" : "var(--ink)") : "var(--ink-3)", boxShadow: on ? "0 1px 2px rgba(16,19,23,.12)" : "none", transition: "all .12s" }}>
                {label}
                <span className="tnum" style={{ fontSize: 11, fontWeight: 700, color: on ? "var(--ink-3)" : "var(--ink-4)", background: on ? "var(--line-2)" : "transparent", padding: "0 6px", borderRadius: 999, minWidth: 16, textAlign: "center" }}>{cnt}</span>
              </button>
            );
          })}
        </div>
        {sort.key !== "default" && (
          <button type="button" onClick={() => setSort({ key: "default", dir: 1 })}
            style={{ marginLeft: 4, fontSize: 12, color: "var(--accent)", background: "transparent", border: "none", cursor: "pointer", fontWeight: 600 }}>
            ↺ Bỏ sắp xếp
          </button>
        )}
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 12, color: "var(--ink-4)" }}>{rows.length}/{ships.length} lô · bấm tiêu đề cột để sắp xếp</span>
      </div>

      {/* table area — card scrolls both axes, header & first col stay pinned */}
      <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", padding: "16px 22px 14px" }}>
        <div style={{ flex: 1, minHeight: 0, background: "#fff", border: "1px solid var(--line)", borderRadius: 12, overflow: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: minW }}>
            <thead>
              <tr>
                <TH w={40} align="center">#</TH>
                <TH sticky><SortBtn k="customer" sort={sort} onSort={toggleSort}>Khách hàng</SortBtn></TH>
                <TH>Cont</TH>
                <TH>Tuyến</TH>
                <TH>Lịch trình</TH>
                <TH align="right"><SortBtn k="cost" sort={sort} onSort={toggleSort} align="right">Chi phí</SortBtn></TH>
                <TH w={44}></TH>
              </tr>
            </thead>
            <tbody>
              {rows.map((s, i) => {
                const cc = calcCost(s.cost);
                const veh = isHph ? calcVeh(s.veh) : calcVehICD(s.veh);

                const r = m.r;
                const costMain = m.cost;

                const paid = r.phaiThu > 0 && r.conNo <= 0;
                const overdue = m.overdue;
                return (
                  <tr key={s.id} style={{ transition: "background .1s", background: "transparent" }}

                    onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}>
                    <TD align="center"><span className="tnum" style={{ color: "var(--ink-4)", fontSize: 12.5 }}>{i + 1}</span></TD>

                      <EditCell onClick={() => setModal({ id: s.id, type: "info" })}>
                        <div style={{ fontWeight: 600, fontSize: 13.5 }}>{s.customer || <span style={{ color: "var(--ink-4)", fontWeight: 400 }}>(chưa đặt tên)</span>}</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 7, marginTop: 3 }}>

                          <Badge tone={s.io === "Nhập" ? "blue" : "gray"}>{s.io}</Badge>
                        </div>
                      </EditCell>
                    </TD>
                    <TD>
                      <EditCell onClick={() => setModal({ id: s.id, type: "info" })}>
                        {isHph ? (
                          <>
                            <div style={{ fontWeight: 600, fontSize: 13 }} className="tnum">{s.qty} × {s.contType}</div>
                            <div style={{ fontSize: 11.5, color: "var(--ink-4)", marginTop: 2 }} className="tnum">{s.contNo || "—"}</div>
                          </>
                        ) : (
                          <>
                            <div style={{ fontWeight: 600, fontSize: 13 }} className="tnum">{s.contNo || "—"}</div>
                            <div style={{ fontSize: 11.5, color: "var(--ink-4)", marginTop: 2 }} className="tnum">{s.contType}{s.kho ? " · " + s.kho : ""}</div>
                            {!isHph && (
                              <div style={{ display: "inline-flex", alignItems: "center", gap: 5, marginTop: 4, fontSize: 10.5, fontWeight: 700, padding: "2px 8px", borderRadius: 999,
                                color: (s.bksRa && s.bksRa.trim()) ? "var(--good)" : "var(--warn)", background: (s.bksRa && s.bksRa.trim()) ? "var(--good-weak)" : "#fcf3e2" }}>
                                <span style={{ width: 6, height: 6, borderRadius: 999, background: "currentColor" }} />
                                {(s.bksRa && s.bksRa.trim()) ? "Đã ra · " + s.bksRa : "Chưa ra"}
                              </div>
                            )}
                          </>
                        )}
                      </EditCell>
                    </TD>
                    <TD>
                      <EditCell onClick={() => setModal({ id: s.id, type: "info" })}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5 }}>
                          <span style={{ color: "var(--ink-2)" }}>{s.from || "—"}</span>
                          <span style={{ color: "var(--accent)", flexShrink: 0 }}><I.arrow /></span>
                          <span style={{ color: "var(--ink-2)" }}>{s.to || "—"}</span>
                        </div>
                      </EditCell>
                    </TD>
                    <TD>
                      <EditCell onClick={() => setModal({ id: s.id, type: "info" })}>
                        {isHph ? (
                          <>
                            <div style={{ fontSize: 12.5, color: "var(--ink-2)" }} className="tnum">Tàu: {fmtDate(s.sailDate) || "—"}</div>
                            <div style={{ fontSize: 11.5, color: "var(--ink-4)", marginTop: 2 }}>Cắt máng {s.cutOff || "—"}</div>
                          </>
                        ) : (
                          <>
                            <div style={{ fontSize: 12.5, color: "var(--ink-2)" }} className="tnum">Đến: {fmtDate(s.contDen) || "—"}</div>
                            {(() => { const ft = calcFreeTime(s, cfg.freeTimeHours); return ft ? (
                              <div style={{ display: "inline-flex", alignItems: "center", gap: 5, marginTop: 3, fontSize: 10.5, fontWeight: 700, padding: "2px 8px", borderRadius: 999, color: ft.connect ? "var(--good)" : "var(--danger)", background: ft.connect ? "var(--good-weak)" : "#fce8e8" }}>
                                <span style={{ width: 6, height: 6, borderRadius: 999, background: "currentColor" }} />{ft.connect ? "CONNECT" : "DISCONNECT"} <span style={{ fontWeight: 500, opacity: .8 }}>· {fmtHours(ft.hours)}</span>
                              </div>
                            ) : <div style={{ fontSize: 11.5, color: "var(--ink-4)", marginTop: 2 }} className="tnum">Ra: {fmtDate(s.contRa) || "—"}</div>; })()}
                          </>
                        )}
                      </EditCell>
                    </TD>
                    <TD pad="6px 10px">
                      <CellBtn main={fmtVND(costMain)} sub={costSub} onClick={() => setModal({ id: s.id, type: "cost" })} />
                      {(() => {
                        const miss = ((s.cost && s.cost.items) || []).filter((it) => it.color && it.item && !toNum(it.amount));
                        if (!miss.length) return null;
                        return (
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 5, paddingLeft: 9 }}>
                            {miss.map((it) => {
                              const dot = colorHex(it.color) || "var(--warn)";
                              return (
                                <span key={it.id} title={"Chưa điền: " + it.item}
                                  style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 10.5, fontWeight: 600, padding: "1px 7px", borderRadius: 999, color: dot, background: "var(--line-2)" }}>
                                  <span style={{ width: 6, height: 6, borderRadius: 999, background: dot }} />{it.item}
                                </span>
                              );
                            })}
                          </div>
                        );
                      })()}
                    </TD>
                    <TD align="center">
                      <button type="button" onClick={() => setModal({ id: s.id, type: "info" })} title="Sửa thông tin lô hàng"
                        style={{ width: 30, height: 30, display: "grid", placeItems: "center", border: "none", borderRadius: 8, background: "transparent", color: "var(--ink-4)", cursor: "pointer" }}
                        onMouseEnter={(e) => { e.currentTarget.style.background = "var(--accent-weak)"; e.currentTarget.style.color = "var(--accent)"; }}
                        onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--ink-4)"; }}>
                        <I.edit />
                      </button>
                    </TD>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {rows.length === 0 && <div style={{ padding: "40px", textAlign: "center", color: "var(--ink-4)", fontSize: 13.5 }}>Không tìm thấy lô hàng phù hợp.</div>}
        </div>
        <div style={{ marginTop: 10, fontSize: 12, color: "var(--ink-4)", display: "flex", alignItems: "center", gap: 7, flexShrink: 0 }}>
          <I.fx /> Chi phí thống kê theo từng lô. Doanh thu & công nợ thu theo <b style={{ color: "var(--ink-3)" }}>Bảng kê</b> (gom lô theo ngày cont ra). Bấm ô <b style={{ color: "var(--ink-3)" }}>Chi phí</b> để phân bổ, ô <b style={{ color: "var(--ink-3)" }}>₫</b> để nhập doanh thu.
        </div>
      </div>
      </>) : view === "price" ? <BangGiaPage cfg={cfg} setCfg={setCfgKey} /> : <KePage ke={ke} onNew={() => setShowKe(true)} onOpen={(st) => setViewKe(st)} />}

      {active && modal.type === "cost" && <CostPopup ship={active} patch={(np) => patch(active.id, np)} onClose={() => setModal(null)} cfg={cfg} addCfg={addCfg} />}
      {active && modal.type === "rev" && (isHph
        ? <RevenuePopup ship={active} patch={(np) => patch(active.id, np)} onClose={() => setModal(null)} cfg={cfg} addCfg={addCfg} />
        : <RevenuePopupICD ship={active} patch={(np) => patch(active.id, np)} onClose={() => setModal(null)} cfg={cfg} addCfg={addCfg} />)}
      {active && modal.type === "info" && <InfoPopup ship={active} isHph={isHph} patch={(np) => patch(active.id, np)} patchOther={(id, np) => patch(id, np)} siblings={ships.filter((x) => x.id !== active.id)} onClose={() => setModal(null)} cfg={cfg} addCfg={addCfg} />}
      {showCfg && <ConfigPopup cfg={cfg} setCfg={setCfgKey} onClose={() => setShowCfg(false)} />}
      {showKe && <StatementModal hph={hph} icd={icd} cfg={cfg} onSave={(st) => setKe((k) => [...k, st])} onClose={() => setShowKe(false)} />}
      {viewKe && <SavedStatementModal st={viewKe} onDelete={(id) => setKe((k) => k.filter((x) => x.id !== id))} onUpdate={(ns) => { setKe((k) => k.map((x) => (x.id === ns.id ? ns : x))); setViewKe(ns); }} onClose={() => setViewKe(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();
  </script>
</body>
</html>
